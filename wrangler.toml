name = "telegram-voice-bot"
main = "src/index.js"
compatibility_date = "2024-07-06"

# R2 bucket for temp file storage
[[r2_buckets]]
binding = "VOICE_BUCKET"
bucket_name = "telegram-voice-temp"

# Durable Object binding
[[durable_objects.bindings]]
name = "CONVERTER"
class_name = "AudioConverter"

# Optional: route for DO
[[migrations]]
tag = "v1"
new_classes = ["AudioConverter"]
